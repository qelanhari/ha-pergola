alias: "Pergola: Reset Morning Lock"
description: >
  Resets pergola_ready to off every night at midnight to prepare
  the next day's morning calibration.
  Adapt the entity name to match your configuration.
triggers:
  - trigger: time
    at: "00:00:00"
conditions: []
actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.pergola_ready
mode: single
