alias: "Pergola: Unlock After Calibration"
description: >
  Activates pergola_ready once today's calibration is confirmed AND solar
  elevation exceeds 20°. Also triggers on HA restart to recover from a
  mid-day reboot.
  Adapt entity names to match your configuration.
triggers:
  - trigger: state
    entity_id: input_text.pergola_last_calibration
  - trigger: numeric_state
    entity_id: sensor.sun_solar_elevation
    above: 20
  - trigger: event
    event_type: homeassistant_start
conditions:
  - condition: state
    entity_id: input_boolean.pergola_ready
    state: "off"
  - condition: numeric_state
    entity_id: sensor.sun_solar_elevation
    above: 20
  # Optional: skip if a priority lock is active
  # Remove or adapt this condition if you don't use a lock sensor.
  - condition: not
    conditions:
      - condition: or
        conditions:
          - condition: state
            entity_id: sensor.pergola_priority_lock_originator
            state: rain
          - condition: state
            entity_id: sensor.pergola_priority_lock_originator
            state: temperature
          - condition: state
            entity_id: sensor.pergola_priority_lock_originator
            state: security
  - condition: template
    value_template: "{{ states('input_text.pergola_last_calibration') == now().strftime('%Y-%m-%d') }}"
actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.pergola_ready
mode: single
