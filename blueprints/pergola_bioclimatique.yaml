blueprint:
  name: Bioclimatic Pergola
  description: >
    Automatically orients bioclimatic pergola slats based on sun position,
    in Winter mode (capture heat) or Summer mode (block radiation).

    **Logic:**

    - **Winter:** follows `profile_angle` upward, holds maximum position when
      the sun descends (`max(target, current_pos)`).
    - **Summer:** full opposition to the sun. Flips to ~0% as soon as 100%
      is no longer enough to block the sun (`s_raw > max_opening_angle`).
    - **Standby / Overcast:** configurable position (default 60%).

    **Sunny detection (optional):** if a PV power sensor is provided, cloud
    detection uses a smoothed power reading vs. a dynamic threshold. Without
    a PV sensor, the automation always follows the solar target (standby still
    applies when the sun is too low).

    **Required helpers:**

    | Helper | Type | Role |
    |---|---|---|
    | Mode selector | input_select | Winter / Summer / Manual (labels are configurable) |
    | Last calibration | input_text | Stores today's calibration date (YYYY-MM-DD) |
    | Pergola ready | input_boolean | Unlocked by the companion automation after calibration |

    **Optional helpers (only if using PV detection):**

    | Helper | Type | Role |
    |---|---|---|
    | PV smooth | input_number (0–5000 W, step 0.1) | Stores smoothed PV power between cycles |
    | Sunny state | input_boolean | Current sunny/overcast state (with 15-min hysteresis) |

  domain: automation
  source_url: https://github.com/qelanhari/ha-pergola/blob/main/blueprints/pergola_bioclimatique.yaml

  input:

    # ── Cover & mode ──────────────────────────────────────────────────────────
    pergola_cover:
      name: Pergola cover entity
      description: Cover entity whose tilt position is controlled.
      selector:
        entity:
          domain: cover

    mode_select:
      name: Mode selector
      description: >
        input_select with three options: Winter, Summer, and Manual.
        The automation does not run in Manual mode.
      selector:
        entity:
          domain: input_select

    winter_mode_value:
      name: Winter mode label
      description: Exact value in the mode selector for Winter (heat-capturing) behaviour.
      default: Winter
      selector:
        text:

    summer_mode_value:
      name: Summer mode label
      description: Exact value in the mode selector for Summer (sun-blocking) behaviour.
      default: Summer
      selector:
        text:

    manual_mode_value:
      name: Manual mode label
      description: Exact value in the mode selector that disables this automation.
      default: Manual
      selector:
        text:

    # ── Sun sensors ───────────────────────────────────────────────────────────
    azimuth_sensor:
      name: Solar azimuth sensor
      description: Sun azimuth in degrees (0°=N, 90°=E, 180°=S, 270°=W).
      default: sensor.sun_solar_azimuth
      selector:
        entity:
          domain: sensor

    elevation_sensor:
      name: Solar elevation sensor
      description: Sun elevation above the horizon in degrees.
      default: sensor.sun_solar_elevation
      selector:
        entity:
          domain: sensor

    # ── Optional sensors ──────────────────────────────────────────────────────
    humidity_sensor:
      name: Humidity sensor (optional)
      description: >
        Relative humidity (%). When it exceeds the threshold, the automation is
        blocked to prevent back-and-forth movements with the automatic closure
        triggered by the rain sensor at high humidity.
        Leave empty if you do not use this feature.
      default: ""
      selector:
        entity:
          domain: sensor

    priority_lock_sensor:
      name: Priority lock sensor (optional)
      description: >
        Sensor whose state can be 'rain', 'temperature', or 'security' to block
        the automation entirely. Leave empty if you do not use a lock mechanism.
      default: ""
      selector:
        entity:
          domain: sensor

    # ── PV-based sunny detection (optional) ───────────────────────────────────
    pv_power_sensor:
      name: PV power sensor (optional)
      description: >
        Solar power reading in watts — used to detect cloud cover via a dynamic
        threshold. Without this sensor, the pergola always follows the solar
        target (standby still applies when the sun is too low).
        Leave empty if you do not have a PV or irradiance sensor.
      default: ""
      selector:
        entity:
          domain: sensor

    pv_smooth_helper:
      name: PV smooth helper — input_number (optional)
      description: >
        Stores the smoothed PV power value between cycles (exponential filter α=0.4).
        Required only if a PV power sensor is configured.
      default: ""
      selector:
        entity:
          domain: input_number

    sunny_state_helper:
      name: Sunny state helper — input_boolean (optional)
      description: >
        Tracks the current sunny/overcast state with a 15-minute lock to prevent
        oscillations during fast cloud cover changes.
        Required only if a PV power sensor is configured.
      default: ""
      selector:
        entity:
          domain: input_boolean

    # ── Calibration helpers (required) ────────────────────────────────────────
    last_calibration_helper:
      name: Last calibration helper — input_text
      description: Stores today's calibration date (YYYY-MM-DD). Reset automatically each morning.
      selector:
        entity:
          domain: input_text

    pergola_ready_helper:
      name: Pergola ready helper — input_boolean
      description: >
        Activated by the companion automation once calibration is validated
        and the sun is above 20°. Blocks all movement before the morning calibration.
      selector:
        entity:
          domain: input_boolean

    # ── Geometry ─────────────────────────────────────────────────────────────
    face_azimuth:
      name: Face azimuth (°)
      description: >
        Direction the slats face when fully open (100%).
        135° ≈ South-East, 180° = South, 225° ≈ South-West.
      default: 180
      selector:
        number:
          min: 0
          max: 359
          step: 1
          unit_of_measurement: "°"
          mode: slider

    max_opening_angle:
      name: Maximum slat angle (°)
      description: Physical angle corresponding to 100% opening. Typically 135°.
      default: 135
      selector:
        number:
          min: 90
          max: 180
          step: 1
          unit_of_measurement: "°"
          mode: slider

    calibration_offset:
      name: Calibration offset (°)
      description: >
        Permanent correction for mechanical imprecision.
        Negative = slats more closed than the theoretical value.
      default: 0
      selector:
        number:
          min: -30
          max: 30
          step: 1
          unit_of_measurement: "°"
          mode: slider

    summer_safety_offset:
      name: Summer safety margin (°)
      description: Extra angle in Summer mode to guarantee shade at the flip point.
      default: 10
      selector:
        number:
          min: 0
          max: 30
          step: 1
          unit_of_measurement: "°"
          mode: slider

    # ── Behaviour ─────────────────────────────────────────────────────────────
    step_size:
      name: Position step size (%)
      description: Resolution of target positions. Reduces unnecessary micro-movements.
      default: 5
      selector:
        number:
          min: 1
          max: 20
          step: 1
          unit_of_measurement: "%"
          mode: slider

    cloudy_target:
      name: Standby / overcast position (%)
      description: Position when overcast or sun too low. 60% lets diffuse light through.
      default: 60
      selector:
        number:
          min: 0
          max: 100
          step: 5
          unit_of_measurement: "%"
          mode: slider

    min_useful_percent:
      name: Standby threshold (%)
      description: >
        Below this calculated percentage, the sun is considered too low to be
        useful and the pergola moves to the standby position.
      default: 9
      selector:
        number:
          min: 0
          max: 30
          step: 1
          unit_of_measurement: "%"
          mode: slider

    elevation_min:
      name: Minimum solar elevation (°)
      description: Below this elevation the automation does not run (sunrise/sunset).
      default: 5
      selector:
        number:
          min: 0
          max: 20
          step: 1
          unit_of_measurement: "°"
          mode: slider

    humidity_threshold:
      name: Humidity blocking threshold (%)
      description: >
        Above this level the automation is blocked (requires a humidity sensor).
      default: 80
      selector:
        number:
          min: 50
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider

    pv_panel_tilt:
      name: PV sensor tilt angle (°)
      description: >
        Tilt angle of the PV panel or irradiance sensor from horizontal.
        0° = flat/horizontal, 90° = vertical.
        Used to compute the dynamic sunny threshold based on angle of incidence.
        Only relevant when a PV power sensor is configured.
      default: 30
      selector:
        number:
          min: 0
          max: 90
          step: 1
          unit_of_measurement: "°"
          mode: slider

    pv_max_w:
      name: Estimated peak PV power (W)
      description: >
        Peak power of the PV sensor under clear sky. Used to compute the
        dynamic sunny threshold. Only relevant when a PV sensor is configured.
      default: 3000
      selector:
        number:
          min: 100
          max: 10000
          step: 100
          unit_of_measurement: "W"
          mode: box

# ── Triggers ─────────────────────────────────────────────────────────────────
triggers:
  - trigger: time_pattern
    minutes: "/5"
  - trigger: state
    entity_id: !input mode_select

# ── Mandatory conditions (non-optional sensors only) ─────────────────────────
conditions:
  - condition: not
    conditions:
      - condition: state
        entity_id: !input mode_select
        state: !input manual_mode_value
  - condition: numeric_state
    entity_id: !input elevation_sensor
    above: !input elevation_min

# ── Actions ───────────────────────────────────────────────────────────────────
actions:
  - variables:
      # ── Numeric inputs → accessible in templates ───────────────────────────
      face_azimuth: !input face_azimuth
      max_opening_angle: !input max_opening_angle
      step_size: !input step_size
      calibration_offset: !input calibration_offset
      summer_safety_offset: !input summer_safety_offset
      cloudy_target: !input cloudy_target
      min_useful_percent: !input min_useful_percent
      humidity_threshold: !input humidity_threshold
      pv_panel_tilt: !input pv_panel_tilt
      pv_max_w: !input pv_max_w

      # ── Mode labels ────────────────────────────────────────────────────────
      winter_mode_value: !input winter_mode_value
      summer_mode_value: !input summer_mode_value

      # ── Entity IDs stored as strings for use inside templates ──────────────
      # (!input cannot be used inside {{ }}, so we bridge through variables)
      pergola_cover: !input pergola_cover
      mode_select: !input mode_select
      azimuth_sensor: !input azimuth_sensor
      elevation_sensor: !input elevation_sensor
      humidity_sensor: !input humidity_sensor
      priority_lock_sensor: !input priority_lock_sensor
      pv_power_sensor: !input pv_power_sensor
      pv_smooth_helper: !input pv_smooth_helper
      sunny_state_helper: !input sunny_state_helper
      last_calibration_helper: !input last_calibration_helper

      # ── State readings ────────────────────────────────────────────────────
      azim: "{{ states(azimuth_sensor) | float(0) }}"
      elev: "{{ states(elevation_sensor) | float(0) }}"
      mode: "{{ states(mode_select) }}"
      today_date: "{{ now().strftime('%Y-%m-%d') }}"
      last_calib_date: "{{ states(last_calibration_helper) }}"
      current_pos: "{{ state_attr(pergola_cover, 'current_tilt_position') | default(0, true) | float }}"

      # ── Solar geometry ────────────────────────────────────────────────────
      # profile_angle: angle between the sun ray and the slat plane.
      # Peaks when the sun directly faces the pergola, then decreases.
      pi: 3.14159265
      elev_rad: "{{ elev * pi / 180 }}"
      delta_azim: "{{ (azim - face_azimuth) | abs }}"
      delta_rad: "{{ delta_azim * pi / 180 }}"
      profile_angle: >-
        {% if delta_azim >= 180 %}
          0
        {% else %}
          {% if ((delta_rad)|cos)|abs > 0.001 %}
            {% set tan_p = ((elev_rad)|tan) / ((delta_rad)|cos) %}
            {% set angle = (tan_p | atan) * 180 / pi %}
            {% if angle < 0 %}
              {{ angle + 180 }}
            {% else %}
              {{ angle }}
            {% endif %}
          {% else %}
            90
          {% endif %}
        {% endif %}

      # ── Solar target ──────────────────────────────────────────────────────
      # Winter : profile_angle direct → 0–100%
      # Summer : +90° (opposition); flips to ~0% when s_raw > max_opening_angle
      solar_target_raw: >-
        {% if mode == winter_mode_value %}
            {{ profile_angle + calibration_offset }}
        {% else %}
            {% set s_raw = profile_angle | float + 90 + calibration_offset + summer_safety_offset %}
            {% if s_raw <= max_opening_angle %}
                {{ s_raw }}
            {% else %}
                {{ profile_angle | float - 90 + calibration_offset }}
            {% endif %}
        {% endif %}

      solar_percent_final: >-
        {% set raw = (solar_target_raw / max_opening_angle) * 100 %}
        {% set stepped = (raw / step_size) | round(0) * step_size %}
        {% if stepped < 0 %} 0
        {% elif stepped > 100 %} 100
        {% else %} {{ stepped | int }}
        {% endif %}

      is_standby: "{{ solar_percent_final | int < min_useful_percent }}"

      # ── PV-based cloud detection (gracefully skipped if no sensor) ─────────
      # If no PV sensor: new_is_sunny = true (always track the sun)
      pv_raw: "{{ states(pv_power_sensor) | float(0) if pv_power_sensor != '' else 0 }}"
      pv_smooth_prev: "{{ states(pv_smooth_helper) | float(0) if pv_smooth_helper != '' else 0 }}"
      pv_smooth: "{{ (0.4 * pv_raw + 0.6 * pv_smooth_prev) | round(1) }}"
      cos_panel_tilt: "{{ (pv_panel_tilt * pi / 180) | cos }}"
      sin_panel_tilt: "{{ (pv_panel_tilt * pi / 180) | sin }}"
      cos_aoi: "{{ [0, (elev_rad | sin) * cos_panel_tilt + (elev_rad | cos) * sin_panel_tilt * (delta_rad | cos)] | max }}"
      pv_sunny_threshold: "{{ [1000, cos_aoi * pv_max_w * 0.30] | max | round(0) }}"
      is_sunny_now: "{{ states(sunny_state_helper) == 'on' if sunny_state_helper != '' else false }}"
      time_since_mode_change: >-
        {%- if sunny_state_helper == '' or states(sunny_state_helper) in ['unknown','unavailable','none'] -%}
          99999
        {%- else -%}
          {{ (now() - states[sunny_state_helper].last_changed).total_seconds() }}
        {%- endif -%}
      mode_change_allowed: "{{ time_since_mode_change | float > 900 }}"
      new_is_sunny: >-
        {%- if pv_power_sensor == '' -%}
          true
        {%- elif mode_change_allowed -%}
          {{ pv_smooth | float > pv_sunny_threshold | float }}
        {%- else -%}
          {{ is_sunny_now }}
        {%- endif -%}

      # ── Final decision ────────────────────────────────────────────────────
      # Overcast/standby → cloudy_target
      # Winter           → max(target, current_pos): rises with the sun, holds peak
      # Summer           → pure target (includes ~0% flip)
      final_target: >-
        {%- if not new_is_sunny or is_standby -%}
           {{ cloudy_target }}
        {%- elif mode == winter_mode_value -%}
           {{ [solar_percent_final | int, current_pos | int] | max }}
        {%- else -%}
           {{ solar_percent_final }}
        {%- endif -%}

  # ── Optional condition: humidity ──────────────────────────────────────────
  - condition: template
    value_template: >
      {{ humidity_sensor == '' or states(humidity_sensor) | float(0) < humidity_threshold }}

  # ── Optional condition: priority lock ─────────────────────────────────────
  - condition: template
    value_template: >
      {{ priority_lock_sensor == '' or states(priority_lock_sensor) not in ['rain', 'temperature', 'security'] }}

  # ── Update PV smooth value (skipped if no PV sensor) ─────────────────────
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ pv_smooth_helper != '' }}"
        sequence:
          - action: input_number.set_value
            target:
              entity_id: "{{ pv_smooth_helper }}"
            data:
              value: "{{ pv_smooth }}"

  # ── Update sunny state (skipped if no PV sensor) ──────────────────────────
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ sunny_state_helper != '' and new_is_sunny and not is_sunny_now }}"
        sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: "{{ sunny_state_helper }}"
      - conditions:
          - condition: template
            value_template: "{{ sunny_state_helper != '' and not new_is_sunny and is_sunny_now }}"
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: "{{ sunny_state_helper }}"

  # ── Condition: movement needed or calibration due ─────────────────────────
  - condition: template
    value_template: "{{ (final_target | float - current_pos | float) | abs > 2 or last_calib_date != today_date }}"

  # ── Morning calibration (once per day) ────────────────────────────────────
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ last_calib_date != today_date }}"
        sequence:
          - action: cover.close_cover_tilt
            target:
              entity_id: !input pergola_cover
          - delay:
              seconds: 45
          - condition: template
            value_template: "{{ state_attr(pergola_cover, 'current_tilt_position') | float(100) < 5 }}"
          - action: input_text.set_value
            target:
              entity_id: !input last_calibration_helper
            data:
              value: "{{ today_date }}"

  # ── Condition: pergola ready (post-calibration gate) ──────────────────────
  - condition: state
    entity_id: !input pergola_ready_helper
    state: "on"

  # ── Final positioning ─────────────────────────────────────────────────────
  - action: cover.set_cover_tilt_position
    target:
      entity_id: !input pergola_cover
    data:
      tilt_position: >
        {% if final_target | int > 100 %} 100
        {% elif final_target | int < 0 %} 0
        {% else %} {{ final_target | int }}
        {% endif %}

mode: single
